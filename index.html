<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório XSS Vulnerável</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1e1e1e;
            color: white;
            padding: 40px;
        }

        .box {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #resultado {
            margin-top: 20px;
            padding: 15px;
            background: #111;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Laboratório XSS</h1>

    <p>Digite qualquer texto:</p>

    <input type="text" id="entrada" placeholder="Digite aqui">

    <button onclick="mostrar()">Enviar</button>

    <div id="resultado"></div>
</div>

<script>
    function mostrar() {

        // VULNERABILIDADE XSS:
        // Entrada do usuário inserida diretamente no innerHTML

        let valor = document.getElementById("entrada").value;

        document.getElementById("resultado").innerHTML =
            "Você digitou: " + valor;
    }
</script>

</body>
</html>
